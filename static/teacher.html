<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photelier Academy - 先生用ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
      background: #f0f4f6;
      min-height: 100dvh;
    }

    header {
      background: white;
      border-bottom: 1px solid #d5e5eb;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #2c4a58;
    }

    .logo span { color: #5d8fa3; }

    .badge {
      background: linear-gradient(135deg, #5d8fa3, #3d7080);
      color: white;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      font-size: 20px;
      color: #1c2b35;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #4a6070;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .student-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .student-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .card-header:hover { background: #f0f4f6; }

    .student-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e0edf2, #c5d8e8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .student-name {
      font-size: 16px;
      font-weight: 600;
      color: #1c2b35;
    }

    .student-meta {
      font-size: 12px;
      color: #4a7a8a;
      margin-top: 2px;
    }

    .card-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .msg-count {
      font-size: 13px;
      color: #4a6070;
      background: #e0edf2;
      padding: 4px 10px;
      border-radius: 12px;
    }

    .refresh-btn {
      padding: 6px 14px;
      background: linear-gradient(135deg, #5d8fa3, #3d7080);
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .refresh-btn:hover { opacity: 0.85; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .chevron {
      font-size: 12px;
      color: #5d8fa3;
      transition: transform 0.3s;
    }

    .chevron.open { transform: rotate(180deg); }

    .card-body {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #e0edf2;
    }

    .card-body.open { display: block; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: 1fr; }
    }

    .summary-item {
      background: #f0f4f6;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .summary-item.full-width {
      grid-column: 1 / -1;
    }

    .summary-label {
      font-size: 11px;
      font-weight: 700;
      color: #5d8fa3;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-text {
      font-size: 14px;
      color: #1c2b35;
      line-height: 1.6;
    }

    .no-data {
      text-align: center;
      padding: 24px;
      color: #4a7a8a;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: #5d8fa3;
      font-size: 14px;
    }

    .expired-badge {
      font-size: 11px;
      background: #fde8e8;
      color: #c0392b;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .end-date {
      font-size: 11px;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 3px 8px;
      border-radius: 10px;
    }

    .reload-all-btn {
      display: block;
      margin: 0 auto 24px;
      padding: 10px 24px;
      background: white;
      border: 1.5px solid #5d8fa3;
      border-radius: 20px;
      color: #5d8fa3;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reload-all-btn:hover { background: #e0edf2; }

    .chat-btn {
      padding: 6px 14px;
      background: white;
      border: 1px solid #ccd8de;
      border-radius: 20px;
      color: #4a7a8a;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-btn:hover { background: #e0edf2; border-color: #5d8fa3; }

    /* 会話モーダル */
    #conv-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #conv-modal.open { display: flex; }

    #conv-box {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 640px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    #conv-header {
      padding: 16px 20px;
      border-bottom: 1px solid #d5e5eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #conv-title { font-size: 16px; font-weight: 700; color: #1c2b35; }

    #conv-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #4a7a8a;
    }

    #conv-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .conv-msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .conv-msg.user { align-self: flex-end; align-items: flex-end; }
    .conv-msg.assistant { align-self: flex-start; align-items: flex-start; }

    .conv-role {
      font-size: 11px;
      color: #4a7a8a;
      margin-bottom: 3px;
    }

    .conv-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .conv-msg.user .conv-bubble {
      background: linear-gradient(135deg, #5d8fa3, #3d7080);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .conv-msg.assistant .conv-bubble {
      background: #f0f4f6;
      color: #1c2b35;
      border-bottom-left-radius: 4px;
      border: 1px solid #d5e5eb;
    }

    #conv-empty {
      text-align: center;
      padding: 40px;
      color: #4a7a8a;
      font-size: 14px;
    }

    /* 提出物 */
    .submit-view-btn {
      padding: 6px 14px;
      background: linear-gradient(135deg, #e8a87c, #d47c4a);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-view-btn:hover { opacity: 0.85; }

    #sub-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #sub-modal.open { display: flex; }
    #sub-box {
      background: white;
      border-radius: 20px;
      width: 100%;
      max-width: 660px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    #sub-header {
      padding: 16px 20px;
      border-bottom: 1px solid #d5e5eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #sub-title { font-size: 16px; font-weight: 700; color: #1c2b35; }
    #sub-close {
      background: none; border: none; font-size: 22px; cursor: pointer; color: #4a7a8a;
    }
    #sub-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .sub-card {
      background: #f8fbfc;
      border: 1px solid #d5e5eb;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .sub-card-task {
      font-size: 14px;
      font-weight: 700;
      color: #1c2b35;
      margin-bottom: 6px;
    }
    .sub-card-date {
      font-size: 11px;
      color: #8aabbf;
      margin-bottom: 8px;
    }
    .sub-card-content {
      font-size: 13px;
      color: #2c4a58;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sub-card-img {
      max-width: 240px;
      max-height: 200px;
      border-radius: 10px;
      margin-top: 10px;
      border: 1px solid #cde;
      display: block;
    }
    .sub-card-url {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #5d8fa3;
      text-decoration: none;
      word-break: break-all;
    }
    .sub-card-url:hover { text-decoration: underline; }
    #sub-empty {
      text-align: center;
      padding: 40px;
      color: #4a7a8a;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Photelier <span>Academy</span> AI</div>
  <div class="badge">👩‍🏫 先生用ダッシュボード</div>
</header>

<div class="container">
  <h1>受講生の相談まとめ 📋</h1>
  <p class="subtitle">個別コンサル前に確認してね。各カードをクリックすると詳細が見られるよ😊</p>

  <button class="reload-all-btn" onclick="loadAllStudents()">🔄 全員分を更新する</button>

  <div class="student-grid" id="student-grid">
    <div class="loading">読み込み中...</div>
  </div>
</div>

<!-- 提出物ビューアーモーダル -->
<div id="sub-modal" onclick="closeSub()">
  <div id="sub-box" onclick="event.stopPropagation()">
    <div id="sub-header">
      <div id="sub-title">📝 提出物</div>
      <button id="sub-close" onclick="closeSub()">✕</button>
    </div>
    <div id="sub-body">
      <div id="sub-empty">読み込み中...</div>
    </div>
  </div>
</div>

<!-- 会話ビューアーモーダル -->
<div id="conv-modal" onclick="closeConv()">
  <div id="conv-box" onclick="event.stopPropagation()">
    <div id="conv-header">
      <div id="conv-title">💬 会話内容</div>
      <button id="conv-close" onclick="closeConv()">✕</button>
    </div>
    <div id="conv-messages"></div>
  </div>
</div>

<script>
  let studentsData = [];

  async function loadAllStudents() {
    const grid = document.getElementById('student-grid');
    grid.innerHTML = '<div class="loading">読み込み中...</div>';

    const res = await fetch('/api/students');
    const data = await res.json();
    studentsData = data.students;

    grid.innerHTML = '';
    for (const name of studentsData) {
      const card = createStudentCard(name);
      grid.appendChild(card);
    }

    // ステータス情報を取得
    for (const name of studentsData) {
      loadStudentStatus(name);
    }
  }

  function createStudentCard(name) {
    const div = document.createElement('div');
    div.className = 'student-card';
    div.id = `card-${name}`;
    div.innerHTML = `
      <div class="card-header" onclick="toggleCard('${name}')">
        <div class="student-info">
          <div class="avatar">👤</div>
          <div>
            <div class="student-name">${name}</div>
            <div class="student-meta" id="meta-${name}">情報取得中...</div>
          </div>
        </div>
        <div class="card-right">
          <span class="msg-count" id="count-${name}">-</span>
          <button class="chat-btn" onclick="event.stopPropagation(); openConv('${name}')">💬 会話を見る</button>
          <button class="submit-view-btn" onclick="event.stopPropagation(); openSub('${name}')">📝 提出物</button>
          <button class="refresh-btn" onclick="event.stopPropagation(); loadSummary('${name}', true)">要約を取得</button>
          <span class="chevron" id="chevron-${name}">▼</span>
        </div>
      </div>
      <div class="card-body" id="body-${name}">
        <div class="no-data">「要約を取得」ボタンを押してね😊</div>
      </div>
    `;
    return div;
  }

  const TOTAL_TASKS = 37;

  async function loadStudentStatus(name) {
    try {
      const [statusRes, progressRes] = await Promise.all([
        fetch(`/api/status/${encodeURIComponent(name)}`),
        fetch(`/api/progress/${encodeURIComponent(name)}`)
      ]);
      const status = await statusRes.json();
      const progress = await progressRes.json();
      const completed = (progress.completed || []).length;
      const pct = Math.round(completed / TOTAL_TASKS * 100);

      const meta = document.getElementById(`meta-${name}`);
      const countEl = document.getElementById(`count-${name}`);
      const endDate = status.end_date ? status.end_date.replace(/-/g, '/') : '未設定';

      if (status.is_expired) {
        meta.innerHTML = `<span class="expired-badge">⛔ サポート終了</span>`;
      } else {
        meta.innerHTML = `<span class="end-date">✅ ${endDate}まで</span> &nbsp; 今月残り ${status.monthly_remaining}/${status.monthly_limit}件`;
      }

      countEl.innerHTML = `
        <span style="font-weight:600;color:#1c2b35">${completed}/${TOTAL_TASKS}件</span>
        <span style="color:#4a7a8a;font-size:11px">（${pct}%）</span>
      `;
    } catch {}
  }

  function toggleCard(name) {
    const body = document.getElementById(`body-${name}`);
    const chevron = document.getElementById(`chevron-${name}`);
    body.classList.toggle('open');
    chevron.classList.toggle('open');
  }

  async function loadSummary(name, forceOpen = false) {
    const body = document.getElementById(`body-${name}`);
    const countEl = document.getElementById(`count-${name}`);

    body.classList.add('open');
    document.getElementById(`chevron-${name}`).classList.add('open');
    body.innerHTML = '<div class="loading">✨ AIが要約を生成中...</div>';

    try {
      const res = await fetch(`/api/summary/${encodeURIComponent(name)}`);
      const data = await res.json();

      countEl.textContent = data.message_count ? `${data.message_count}件の質問` : '質問なし';

      if (!data.summary) {
        body.innerHTML = '<div class="no-data">📭 まだ会話履歴がないよ</div>';
        return;
      }

      const s = data.summary;
      body.innerHTML = `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-label">📝 主な悩み・相談内容</div>
            <div class="summary-text">${s['悩み'] || '-'}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">💡 アドバイスした方向性</div>
            <div class="summary-text">${s['アドバイス'] || '-'}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">✅ 提案した次のステップ</div>
            <div class="summary-text">${s['次のステップ'] || '-'}</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">🎯 コンサルで触れるといいポイント</div>
            <div class="summary-text">${s['注目ポイント'] || '-'}</div>
          </div>
        </div>
      `;
    } catch (e) {
      body.innerHTML = '<div class="no-data">エラーが発生しました。もう一度試してね。</div>';
    }
  }

  async function openConv(name) {
    const modal = document.getElementById('conv-modal');
    const msgs = document.getElementById('conv-messages');
    document.getElementById('conv-title').textContent = `💬 ${name}さんの会話`;
    msgs.innerHTML = '<div id="conv-empty">読み込み中...</div>';
    modal.classList.add('open');

    try {
      const res = await fetch(`/api/conversation/${encodeURIComponent(name)}`);
      const data = await res.json();

      if (!data.messages || data.messages.length === 0) {
        msgs.innerHTML = '<div id="conv-empty">📭 まだ会話がないよ</div>';
        return;
      }

      msgs.innerHTML = '';
      for (const msg of data.messages) {
        const isUser = msg.role === 'user';
        const div = document.createElement('div');
        div.className = `conv-msg ${isUser ? 'user' : 'assistant'}`;
        div.innerHTML = `
          <div class="conv-role">${isUser ? '👤 受講生' : '🤖 AI'}</div>
          <div class="conv-bubble">${escapeHtml(msg.content)}</div>
        `;
        msgs.appendChild(div);
      }
      msgs.scrollTop = 0;
    } catch {
      msgs.innerHTML = '<div id="conv-empty">エラーが発生しました</div>';
    }
  }

  function closeConv() {
    document.getElementById('conv-modal').classList.remove('open');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function openSub(name) {
    const modal = document.getElementById('sub-modal');
    const body = document.getElementById('sub-body');
    document.getElementById('sub-title').textContent = `📝 ${name}さんの提出物`;
    body.innerHTML = '<div id="sub-empty">読み込み中...</div>';
    modal.classList.add('open');

    try {
      const res = await fetch(`/api/submissions/${encodeURIComponent(name)}`);
      const data = await res.json();

      if (!data.submissions || data.submissions.length === 0) {
        body.innerHTML = '<div id="sub-empty">📭 まだ提出物がないよ</div>';
        return;
      }

      body.innerHTML = '';
      for (const sub of data.submissions) {
        const dateStr = sub.submitted_at
          ? new Date(sub.submitted_at).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })
          : '';
        const card = document.createElement('div');
        card.className = 'sub-card';
        card.innerHTML = `
          <div class="sub-card-task">📌 ${escapeHtml(sub.assignment_name)}</div>
          <div class="sub-card-date">${dateStr}</div>
          ${sub.content ? `<div class="sub-card-content">${escapeHtml(sub.content)}</div>` : ''}
          ${sub.url ? `<a class="sub-card-url" href="${escapeHtml(sub.url)}" target="_blank">🔗 ${escapeHtml(sub.url)}</a>` : ''}
          ${sub.image_data ? `<img class="sub-card-img" src="data:image/jpeg;base64,${sub.image_data}" alt="提出画像">` : ''}
        `;
        body.appendChild(card);
      }
    } catch {
      body.innerHTML = '<div id="sub-empty">エラーが発生しました</div>';
    }
  }

  function closeSub() {
    document.getElementById('sub-modal').classList.remove('open');
  }

  // 初回読み込み
  loadAllStudents();
</script>
</body>
</html>
